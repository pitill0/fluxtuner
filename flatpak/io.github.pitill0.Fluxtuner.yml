app-id: io.github.pitill0.Fluxtuner
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: fluxtuner

finish-args:
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio

modules:
  - python3-requirements.json

  - name: fluxtuner
    buildsystem: simple

    build-commands:
      - pip3 install --no-deps --no-build-isolation --prefix=/app .
      - install -Dm644 flatpak/io.github.pitill0.Fluxtuner.desktop /app/share/applications/io.github.pitill0.Fluxtuner.desktop
      - install -Dm644 flatpak/io.github.pitill0.Fluxtuner.TUI.desktop /app/share/applications/io.github.pitill0.Fluxtuner.TUI.desktop
      - install -Dm644 flatpak/io.github.pitill0.Fluxtuner.metainfo.xml /app/share/metainfo/io.github.pitill0.Fluxtuner.metainfo.xml
      - install -Dm644 flatpak/io.github.pitill0.Fluxtuner.png /app/share/icons/hicolor/512x512/apps/io.github.pitill0.Fluxtuner.png

    sources:
      - type: dir
        path: ..
