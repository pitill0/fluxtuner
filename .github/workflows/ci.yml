name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    name: Ruff, compile and tests / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project with dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: |
          ruff check .

      - name: Ruff check formatting
        run: |
          ruff format --check .

      - name: Compile Python files
        run: |
          python -m compileall fluxtuner tests

      - name: Run tests
        run: |
          python -m pytest
